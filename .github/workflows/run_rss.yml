name: Run RSS Summarizer

on:
  workflow_dispatch:      # لتشغيله يدويًا من تبويب Actions
  schedule:
    - cron: '0 * * * *'   # لتشغيله كل ساعة (يمكنك تغيير الجدولة)

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install requirements
        run: pip install -r requirements.txt
      - name: Run main.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py
      - name: Commit and push rss.xml if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add rss.xml
          git diff --cached --quiet || git commit -m "Update rss.xml"
          git push
